<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>puf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/style.css">
  <link rel="icon" type="image/svg+xml" href="/static/icons/favicon.png">
</head>
<body>
<div class="app">

  <header class="topbar">
    <span class="topbar-logo">&#x25C8; puf</span>
    <form class="topbar-form" onsubmit="launchNmapForm(event)">
      <input type="text" id="target-input" placeholder="new target IP or hostname..." autocomplete="off">
      <button type="submit" class="btn btn-primary">+ add target</button>
    </form>
    <button class="btn btn-ghost" onclick="refreshTree()">&#x21BA;</button>
  </header>

  <aside class="panel-tree">
    <div class="panel-header">Results</div>
    <div class="tree-scroll">
      <ul id="tree-root"></ul>
    </div>
  </aside>

  <main class="panel-output">

    <div class="tabbar" id="tabbar">
      <span class="tabbar-empty" id="tabbar-empty">No scans yet</span>
    </div>
    
    <div class="output-area" id="output-area">
      <div class="empty-hint" id="empty-hint">
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/>
        </svg>
        <p>Launch a scan or click a file in the tree</p>
      </div>
    </div>
    
    <div id="flagged-panel">
      <div id="flagged-title" style="color:var(--muted);font-size:var(--xs);margin-bottom:4px;">Flagged targets (click to scroll to)</div>
      <div id="flagged-list"></div>
    </div>
    
    <div id="bottom-bar">

      <div id="cmd-log-and-panel">
        <div id="cmd-log">
          <div class="bar-title">Command Log</div>
          <div id="cmd-log-list"></div>
        </div>
        <div id="cmd-panel">
          <div class="bar-title" style="display:flex;align-items:center;justify-content:space-between;">
            Commands
            <div style="display:flex;align-items:center;gap:6px;">
              <button id="recurse-btn" class="btn-ghost" onclick="toggleRecurse()" style="font-size:var(--xs);">○ recurse</button>
              <input id="recurse-depth" type="number" value="2" min="1" max="10"
                style="width:36px;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:var(--r);padding:2px 4px;font-size:var(--xs);text-align:center;" title="Recursion depth">
              <button id="autofilter-btn" class="btn-ghost" onclick="toggleAutoFilter()" style="font-size:var(--xs);"></button>
              <button class="btn-ghost" onclick="resetCommands()" style="font-size:var(--xs);">↺ reset</button>
            </div>
          </div>
        <div id="cmd-panel-list"></div>
      </div>
    </div>
  </main>

  <div id="popover" class="popover" style="display:none">
    <div class="popover-title" id="popover-title"></div>
    <div id="popover-actions"></div>
  </div>

  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-title">Delete?</div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modal-confirm" style="background:var(--red);">Delete</button>
      </div>
    </div>
  </div>

  <div id="filter-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.6); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#1e1e2e; border:1px solid #444; border-radius:8px; padding:24px;
      min-width:380px; max-width:480px; color:#cdd6f4;">
      <h3 style="margin:0 0 16px">Custom Filter</h3>
      <label style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
        <input type="checkbox" id="fm-smart-enabled" checked onchange="toggleSmartLimit()">
        Smart filtering
      </label>
      <label style="display:block; margin-bottom:12px;">
        Smart filter limit
        <input id="fm-smart-limit" type="number" value="1000"
          style="display:block; width:100%; margin-top:4px; padding:6px;
          background:#313244; border:1px solid #555; border-radius:4px; color:#cdd6f4;">
      </label>
      <label style="display:block; margin-bottom:12px;">
        Filter status codes <span style="color:#888">(e.g. 404, 301)</span>
        <div style="display:flex;gap:6px;margin-top:4px;">
          <input id="fm-status" type="text" placeholder="404, 301"
            style="flex:1;padding:6px;background:#313244;border:1px solid #555;border-radius:4px;color:#cdd6f4;">
          <button id="fm-status-mode" onclick="toggleFilterMode('fm-status-mode')"
            style="width:28px;background:#c0392b;border:none;border-radius:4px;color:#fff;cursor:pointer;font-weight:bold;">✕</button>
        </div>
      </label>
      <label style="display:block; margin-bottom:12px;">
        Filter word counts <span style="color:#888">(e.g. 12, 15)</span>
        <div style="display:flex;gap:6px;margin-top:4px;">
          <input id="fm-words" type="text" placeholder=""
            style="flex:1;padding:6px;background:#313244;border:1px solid #555;border-radius:4px;color:#cdd6f4;">
          <button id="fm-words-mode" onclick="toggleFilterMode('fm-words-mode')"
            style="width:28px;background:#c0392b;border:none;border-radius:4px;color:#fff;cursor:pointer;font-weight:bold;">✕</button>
        </div>
      </label>
      <label style="display:block; margin-bottom:20px;">
        Filter lengths <span style="color:#888">(e.g. 142, 500)</span>
        <div style="display:flex;gap:6px;margin-top:4px;">
          <input id="fm-lengths" type="text" placeholder=""
            style="flex:1;padding:6px;background:#313244;border:1px solid #555;border-radius:4px;color:#cdd6f4;">
          <button id="fm-lengths-mode" onclick="toggleFilterMode('fm-lengths-mode')"
            style="width:28px;background:#c0392b;border:none;border-radius:4px;color:#fff;cursor:pointer;font-weight:bold;">✕</button>
        </div>
      </label>
      <label style="display:block; margin-bottom:12px;">
        Filter by regex <span style="color:#888">(matched against URL & content)</span>
        <div style="display:flex;gap:6px;margin-top:4px;">
          <input id="fm-regex" type="text" placeholder="e.g. \.php$"
            style="flex:1;padding:6px;background:#313244;border:1px solid #555;border-radius:4px;color:#cdd6f4;">
          <button id="fm-regex-mode" onclick="toggleFilterMode('fm-regex-mode')"
            style="width:28px;background:#c0392b;border:none;border-radius:4px;color:#fff;cursor:pointer;font-weight:bold;">✕</button>
        </div>
      </label>
      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button onclick="closeFilterModal()"
          style="padding:8px 16px; background:#313244; border:none; border-radius:4px;
          color:#cdd6f4; cursor:pointer;">Cancel</button>
        <button onclick="runCustomFilter()"
          style="padding:8px 16px; background:orange; border:none; border-radius:4px;
          color:#000; font-weight:bold; cursor:pointer;">Run Filter</button>
      </div>
    </div>
  </div>

  <div id="cmd-edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;width:480px;display:flex;flex-direction:column;gap:12px;">
      <div style="font-size:var(--xs);color:var(--muted);">Editing: <span id="cmd-edit-key" style="color:var(--fg);"></span></div>
      <textarea id="cmd-edit-input" rows="4" style="font-family:'JetBrains Mono',monospace;font-size:var(--xs);background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:var(--r);padding:8px;resize:vertical;"></textarea>
      <div style="display:flex;justify-content:flex-end;gap:8px;">
        <button class="btn-ghost" onclick="closeCmdEditModal()">Cancel</button>
        <button class="btn-ghost primary" id="cmd-edit-save">Save</button>
      </div>
    </div>
  </div>

</div>
<script src="static/js/main.js"></script>
</body>
</html>
